<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maç TV</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,body{
        width:100%;
        height:100%;
        background:#000;
        overflow:hidden;
    }

    .player{
        position:fixed;
        inset:0;
        width:100%;
        height:100%;
    }

    iframe{
        width:100%;
        height:100%;
        border:0;
    }

    /* Görseli konumlandırmak için eklenen stil */
    .logo {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 100px; /* Görsel boyutunu buradan ayarlayabilirsiniz */
        height: auto;
        z-index: 10; /* İframe'in üstünde görünmesini sağlar */
        pointer-events: none; /* Tıklamaların iframe'e geçmesine izin verir */
    }
</style>
</head>
<body>

<img src="images.jpeg" alt="Logo" class="logo">

<div class="player">
    <iframe
        src="https://zeustv263.vip/ch.html?id=b4"
        referrerpolicy="no-referrer"
        allowfullscreen
        allow="autoplay; encrypted-media">
    </iframe>
</div>

</body>
</html>
